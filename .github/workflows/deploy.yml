name: Deploy to GitHub Pages and Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Gate ─────────────────────────────────────────────────────────────
  # This job targets the "production" environment.
  # Configure required reviewers in GitHub Settings → Environments →
  # production to prevent any deployment from proceeding without
  # explicit owner approval.
  approve:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Deployment approved
        run: echo "Deployment approved. Proceeding to deploy."

  # ── GitHub Pages ──────────────────────────────────────────────────────
  deploy-pages:
    needs: approve
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── Vercel ────────────────────────────────────────────────────────────
  deploy-vercel:
    needs: approve
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: npx vercel --prod --yes --cwd . --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
