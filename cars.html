<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SLY Rides | Our Cars</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGO + NAV -->
<header class="site-header">
  <a href="index.html" class="logo-link"><img src="images/logo.jpg" alt="SLY Rides Logo" class="site-logo"></a>
  <nav class="site-nav">
    <a href="cars.html">Browse Cars</a>
    <a href="index.html#how-it-works">How It Works</a>
    <a href="index.html#about">About</a>
  </nav>
</header>

<!-- CARS -->
<div class="container" id="cars">
  <h2 class="fleet-heading">Our Fleet</h2>

  <div class="cars-page-layout">

    <!-- SIDEBAR -->
    <aside class="cars-sidebar">
      <h3 class="sidebar-title">Browse by Type</h3>
      <nav class="sidebar-nav">
        <button class="sidebar-btn active" data-filter="all">All Cars</button>
        <button class="sidebar-btn" data-filter="economy">Economy / Ridesharing</button>
        <button class="sidebar-btn" data-filter="slingshot">Slingshots</button>
      </nav>
    </aside>

    <!-- CAR GRID -->
    <section class="cars" id="car-grid">

      <!-- Slingshot -->
      <div class="car-card" data-category="slingshot">
        <img src="images/car2.jpg" alt="Slingshot R" style="height: 320px; object-position: bottom;">
        <div class="car-info">
          <h3>Slingshot R</h3>
          <p class="car-subtitle">Sports • 2-Seater</p>
          <p class="price">$300 / day • $150 deposit</p>
          <a href="car.html?vehicle=slingshot">
            <button class="select-btn">Select</button>
          </a>
        </div>
      </div>

      <!-- Camry -->
      <div class="car-card" data-category="economy">
        <img src="images/car5.jpg" alt="Camry 2012">
        <div class="car-info">
          <h3>Camry 2012</h3>
          <p class="car-subtitle">Sedan • 5-Seater</p>
          <p class="price">$50 / day • $320 / week • $600 / bi-week • $1,200 / month</p>
          <a href="car.html?vehicle=camry">
            <button class="select-btn">Select</button>
          </a>
        </div>
      </div>

    </section>
  </div>
</div>

<!-- FOOTER -->
<footer>
  &copy; 2026 SLY Rides. All rights reserved.
</footer>

<script src="cars.js"></script>
<script src="chatbot.js"></script>
</body>
</html>
