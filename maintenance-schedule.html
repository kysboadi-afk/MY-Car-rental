<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Schedule Maintenance — SLY Rides</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 520px;
      margin: 0 auto;
      padding: 32px 20px 60px;
      background: #f5f5f5;
      color: #333;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 28px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
    }
    h1 { font-size: 1.4rem; margin: 0 0 6px; color: #111; }
    .subtitle { color: #666; font-size: .95rem; margin: 0 0 24px; }
    .service-badge {
      display: inline-block;
      background: #e8f5e9;
      color: #2e7d32;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: .85rem;
      font-weight: 600;
      margin-bottom: 20px;
    }
    label { display: block; font-weight: 600; margin-bottom: 6px; font-size: .9rem; }
    input[type="datetime-local"],
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
      margin-bottom: 18px;
      appearance: none;
    }
    input[type="datetime-local"]:focus,
    textarea:focus {
      outline: none;
      border-color: #1a73e8;
      box-shadow: 0 0 0 3px rgba(26,115,232,.15);
    }
    textarea { resize: vertical; min-height: 72px; }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .btn:hover { background: #1558b0; }
    .btn:disabled { background: #aaa; cursor: not-allowed; }
    .error-msg {
      color: #c62828;
      background: #ffebee;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: .9rem;
      margin-bottom: 16px;
      display: none;
    }
    .info { color: #888; font-size: .82rem; margin-top: 20px; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📅 Schedule Maintenance</h1>
    <p class="subtitle">Choose a convenient date and time for your service appointment.</p>

    <div id="serviceBadge" class="service-badge">Loading…</div>

    <form id="schedForm" method="POST" action="/api/schedule-maintenance">
      <input type="hidden" id="vehicleId"   name="vehicleId">
      <input type="hidden" id="serviceType" name="serviceType">

      <div id="errorMsg" class="error-msg"></div>

      <label for="scheduledAt">Appointment date &amp; time</label>
      <input type="datetime-local" id="scheduledAt" name="scheduledAt" required>

      <label for="notes">Notes (optional)</label>
      <textarea id="notes" name="notes" maxlength="500" placeholder="Any special instructions or questions…"></textarea>

      <button type="submit" class="btn" id="submitBtn">Confirm appointment</button>
    </form>

    <p class="info">
      Need help? Call us at <a href="tel:+12139166606">+1 (213) 916-6606</a>
    </p>
  </div>

  <script>
    // Read vehicleId and serviceType from URL query params
    const params = new URLSearchParams(window.location.search);
    const vehicleId   = params.get("vehicleId")   || "";
    const serviceType = params.get("serviceType") || "";

    const SERVICE_LABELS = { oil: "Oil change", brakes: "Brake inspection", tires: "Tire replacement" };
    const label = SERVICE_LABELS[serviceType] || serviceType || "Maintenance";

    document.getElementById("vehicleId").value   = vehicleId;
    document.getElementById("serviceType").value = serviceType;
    document.getElementById("serviceBadge").textContent = label;
    document.title = `Schedule ${label} — SLY Rides`;

    if (!vehicleId || !serviceType) {
      document.getElementById("errorMsg").style.display = "block";
      document.getElementById("errorMsg").textContent   =
        "Missing vehicle or service information. Please use the link from your maintenance alert.";
      document.getElementById("submitBtn").disabled = true;
    }

    // Set minimum selectable time to now + 30 min
    const dtInput = document.getElementById("scheduledAt");
    const minDate = new Date(Date.now() + 30 * 60 * 1000);
    // datetime-local format: YYYY-MM-DDTHH:MM
    const pad = (n) => String(n).padStart(2, "0");
    dtInput.min = `${minDate.getFullYear()}-${pad(minDate.getMonth() + 1)}-${pad(minDate.getDate())}T${pad(minDate.getHours())}:${pad(minDate.getMinutes())}`;

    // Submit handler — convert datetime-local value to ISO string before sending
    document.getElementById("schedForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const btn      = document.getElementById("submitBtn");
      const errEl    = document.getElementById("errorMsg");
      const rawDt    = dtInput.value;  // "YYYY-MM-DDTHH:MM"

      if (!rawDt) {
        errEl.style.display  = "block";
        errEl.textContent    = "Please select an appointment date and time.";
        return;
      }

      const selectedDate = new Date(rawDt);
      if (isNaN(selectedDate.getTime()) || selectedDate.getTime() <= Date.now() + 5000) {
        errEl.style.display = "block";
        errEl.textContent   = "Please select a future date and time.";
        return;
      }

      errEl.style.display = "none";
      btn.disabled        = true;
      btn.textContent     = "Submitting…";

      const formData = new FormData(this);
      // Overwrite scheduledAt with ISO string (includes timezone offset)
      formData.set("scheduledAt", selectedDate.toISOString());
      const body = new URLSearchParams(formData).toString();

      fetch("/api/schedule-maintenance", {
        method:  "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body,
      })
        .then((r) => r.text())
        .then((html) => {
          // Replace the page content with the server response HTML
          document.open();
          document.write(html);
          document.close();
        })
        .catch(() => {
          btn.disabled    = false;
          btn.textContent = "Confirm appointment";
          errEl.style.display = "block";
          errEl.textContent   = "Network error. Please check your connection and try again.";
        });
    });
  </script>
<script src="chatbot.js"></script>
</body>
</html>
