<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful | SLY Rides</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .message-box {
      max-width: 600px;
      margin: 100px auto;
      background: #1a1a1a;
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      border: 1px solid #2a2a2a;
      box-shadow: 0 6px 25px rgba(0,0,0,0.5);
    }
    .message-box h1 { color: #4caf50; font-size: 36px; margin-bottom: 20px; }
    .message-box p { font-size: 18px; margin-bottom: 30px; color: #ccc; }
    .message-box a {
      display: inline-block;
      padding: 12px 24px;
      background: #ffb400;
      color: #000;
      border-radius: 12px;
      text-decoration: none;
      font-size: 16px;
      font-weight: bold;
      transition: 0.3s;
    }
    .message-box a:hover { transform: scale(1.05); background: #e0a000; }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="logo-link"><img src="images/logo.jpg" alt="SLY Rides Logo" class="site-logo"></a>
  </header>
  <div class="message-box">
    <h1>✅ Payment Successful!</h1>
    <p>Thank you for booking with SLY Rides! Your car is reserved. We will be in touch shortly to confirm your rental details.</p>
    <a href="index.html">Back to Homepage</a>
  </div>
  <footer>
    &copy; 2026 SLY Rides. All rights reserved.
  </footer>
  <script src="chatbot.js"></script>
  <script>
    // Send the reservation notification email now that payment is confirmed.
    // Booking data was saved to sessionStorage by car.js before the Stripe redirect.
    (function () {
      var API_BASE = "https://sly-rides.vercel.app";
      var raw = sessionStorage.getItem("slyRidesBooking");
      if (!raw) return;
      sessionStorage.removeItem("slyRidesBooking");
      var data;
      try { data = JSON.parse(raw); } catch (e) { return; }
      fetch(API_BASE + "/api/send-reservation-email", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      }).catch(function (err) { console.error("Reservation email error:", err); });
    })();
  </script>
</body>
</html>
