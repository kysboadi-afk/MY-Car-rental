<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful | SLY Rides</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .message-box {
      max-width: 600px;
      margin: 100px auto;
      background: #1a1a1a;
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      border: 1px solid #2a2a2a;
      box-shadow: 0 6px 25px rgba(0,0,0,0.5);
    }
    .message-box h1 { color: #4caf50; font-size: 36px; margin-bottom: 20px; }
    .message-box p { font-size: 18px; margin-bottom: 30px; color: #ccc; }
    .message-box a {
      display: inline-block;
      padding: 12px 24px;
      background: #ffb400;
      color: #000;
      border-radius: 12px;
      text-decoration: none;
      font-size: 16px;
      font-weight: bold;
      transition: 0.3s;
    }
    .message-box a:hover { transform: scale(1.05); background: #e0a000; }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="logo-link"><img src="images/logo.jpg" alt="SLY Rides Logo" class="site-logo"></a>
  </header>
  <div class="message-box">
    <h1>✅ Payment Successful!</h1>
    <p>Thank you for booking with SLY Rides! Your car is reserved. We will be in touch shortly to confirm your rental details.</p>
    <p id="emailStatus" style="font-size:15px;color:#aaa;margin-bottom:16px">Sending confirmation…</p>
    <a id="homeBtn" href="index.html" style="pointer-events:none;opacity:0.5">Back to Homepage</a>
  </div>
  <footer>
    &copy; 2026 SLY Rides. All rights reserved.
  </footer>
  <script src="chatbot.js"></script>
  <script>
    // Send the reservation notification email now that payment is confirmed.
    // Booking metadata was saved to sessionStorage by car.js before the Stripe
    // redirect; the large ID binary was saved separately in IndexedDB to avoid
    // sessionStorage's ~5 MB size cap.
    (function () {
      var API_BASE = "https://sly-rides.vercel.app";

      function enableHomeBtn() {
        var btn = document.getElementById("homeBtn");
        var status = document.getElementById("emailStatus");
        if (btn) { btn.style.pointerEvents = ""; btn.style.opacity = ""; }
        if (status) { status.style.display = "none"; }
      }

      var raw = sessionStorage.getItem("slyRidesBooking");
      if (!raw) { enableHomeBtn(); return; }
      sessionStorage.removeItem("slyRidesBooking");
      var data;
      try { data = JSON.parse(raw); } catch (e) { enableHomeBtn(); return; }

      function showEmailError() {
        var status = document.getElementById("emailStatus");
        if (status) {
          status.textContent = "We couldn't send your confirmation email automatically. Please contact us at slyservices@supports-info.com to confirm your booking.";
          status.style.color = "#ff9800";
          status.style.display = "";
        }
      }

      function sendEmail() {
        fetch(API_BASE + "/api/send-reservation-email", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        }).then(function (res) {
          if (!res.ok) { showEmailError(); }
          enableHomeBtn();
        }).catch(function (err) {
          console.error("Reservation email error:", err);
          showEmailError();
          enableHomeBtn();
        });
      }

      // Retrieve the ID and insurance attachments from IndexedDB, merge into the payload, then send.
      try {
        var openReq = indexedDB.open("slyRidesDB", 1);
        // Create the object store if the DB is being created for the first time
        // (e.g. IndexedDB was cleared between car.html and success.html).
        openReq.onupgradeneeded = function (e) {
          e.target.result.createObjectStore("files");
        };
        openReq.onsuccess = function (e) {
          var db = e.target.result;
          try {
            var tx = db.transaction("files", "readonly");
            var getReq = tx.objectStore("files").get("pendingId");
            getReq.onsuccess = function (ev) {
              var idData = ev.target.result;
              if (idData) {
                data.idBase64   = idData.idBase64;
                data.idFileName = idData.idFileName;
                data.idMimeType = idData.idMimeType;
              }
              // Now retrieve insurance
              try {
                var tx2 = db.transaction("files", "readonly");
                var insReq = tx2.objectStore("files").get("pendingInsurance");
                insReq.onsuccess = function (ev2) {
                  var insData = ev2.target.result;
                  if (insData) {
                    data.insuranceBase64   = insData.insuranceBase64;
                    data.insuranceFileName = insData.insuranceFileName;
                    data.insuranceMimeType = insData.insuranceMimeType;
                  }
                  // Clean up both entries then send
                  try {
                    var cleanTx = db.transaction("files", "readwrite");
                    var store = cleanTx.objectStore("files");
                    store.delete("pendingId");
                    store.delete("pendingInsurance");
                    cleanTx.oncomplete = function () { db.close(); sendEmail(); };
                    cleanTx.onerror   = function () { db.close(); sendEmail(); };
                  } catch (err) { db.close(); sendEmail(); }
                };
                insReq.onerror = function () { db.close(); sendEmail(); };
              } catch (err) { db.close(); sendEmail(); }
            };
            getReq.onerror = function () { db.close(); sendEmail(); };
          } catch (err) { db.close(); sendEmail(); }
        };
        openReq.onerror = function () { sendEmail(); };
      } catch (err) { sendEmail(); }
    })();
  </script>
</body>
</html>
