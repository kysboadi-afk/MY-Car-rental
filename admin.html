<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Admin panel for managing booking calendar — Sly Transportation Services LLC.">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin – Booking Calendar | Sly Transportation Services LLC</title>
  <link rel="icon" href="images/logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    .admin-box {
      max-width: 560px;
      margin: 80px auto 40px;
      background: #1a1a1a;
      padding: 36px 32px;
      border-radius: 16px;
      border: 1px solid #2a2a2a;
      box-shadow: 0 6px 25px rgba(0,0,0,0.5);
    }
    .admin-box h1 { font-size: 24px; color: #ffb400; margin-bottom: 6px; }
    .admin-box p.subtitle { color: #888; font-size: 14px; margin-bottom: 28px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px 12px;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      box-sizing: border-box;
    }
    .form-group input:focus,
    .form-group select:focus { outline: none; border-color: #ffb400; }
    .btn-row { display: flex; gap: 12px; margin-top: 24px; }
    .btn-block {
      flex: 1;
      padding: 12px;
      background: #ffb400;
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-block:hover { background: #e0a000; }
    .btn-unblock {
      flex: 1;
      padding: 12px;
      background: #333;
      color: #ccc;
      border: 1px solid #444;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-unblock:hover { background: #444; color: #fff; }
    #statusMsg {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    #statusMsg.success { background: #1b3a1b; color: #4caf50; border: 1px solid #2e5e2e; }
    #statusMsg.error   { background: #3a1b1b; color: #f44336; border: 1px solid #5e2e2e; }
    #statusMsg.info    { background: #1b2a3a; color: #64b5f6; border: 1px solid #2e4a5e; }
    .current-bookings { margin-top: 36px; }
    .current-bookings h2 { font-size: 16px; color: #aaa; margin-bottom: 12px; }
    .booking-entry {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 8px;
      font-size: 14px;
      color: #ccc;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .booking-entry .vehicle-badge {
      font-size: 11px;
      background: #2a2a2a;
      padding: 2px 8px;
      border-radius: 12px;
      color: #888;
      text-transform: capitalize;
    }
    .no-bookings { color: #555; font-size: 14px; font-style: italic; }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="logo-link"><img src="images/logo.jpg" alt="Sly Transportation Services LLC Logo" class="site-logo"></a>
    <a href="tel:+12139166606" class="header-phone">📞 (213) 916-6606</a>
  </header>

  <div class="admin-box">
    <h1>📅 Admin — Booking Calendar</h1>
    <p class="subtitle">Manually block or unblock dates for a vehicle. Use this when a booking was made but the calendar was not updated automatically.</p>

    <div class="form-group">
      <label for="adminSecret">Admin Password</label>
      <input type="password" id="adminSecret" placeholder="Enter admin password" autocomplete="current-password">
    </div>

    <div class="form-group">
      <label for="vehicleSelect">Vehicle</label>
      <select id="vehicleSelect">
        <option value="camry">Camry 2012</option>
        <option value="slingshot">Slingshot R</option>
      </select>
    </div>

    <div class="form-group">
      <label for="fromDate">Pickup Date</label>
      <input type="text" id="fromDate" placeholder="YYYY-MM-DD">
    </div>

    <div class="form-group">
      <label for="toDate">Return Date</label>
      <input type="text" id="toDate" placeholder="YYYY-MM-DD">
    </div>

    <div class="btn-row">
      <button class="btn-block" id="blockBtn">🔒 Block Dates</button>
      <button class="btn-unblock" id="unblockBtn">🔓 Unblock Dates</button>
    </div>

    <div id="statusMsg"></div>

    <div class="current-bookings">
      <h2>Current Blocked Dates</h2>
      <div id="bookingsList"><span class="no-bookings">Loading…</span></div>
    </div>
  </div>

  <footer>
    &copy; 2026 Sly Transportation Services LLC. All rights reserved. &nbsp;|&nbsp;
    <a href="tel:+12139166606" class="footer-phone">(213) 916-6606</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script>
    (function () {
      var API_BASE = "https://sly-rides.vercel.app";

      // Pre-fill dates from URL params (linked from owner confirmation email)
      var params = new URLSearchParams(window.location.search);
      if (params.get("vehicle")) {
        document.getElementById("vehicleSelect").value = params.get("vehicle");
      }
      if (params.get("from")) document.getElementById("fromDate").value = params.get("from");
      if (params.get("to"))   document.getElementById("toDate").value   = params.get("to");

      // Date pickers
      flatpickr("#fromDate", { dateFormat: "Y-m-d" });
      flatpickr("#toDate",   { dateFormat: "Y-m-d" });

      function showStatus(msg, type) {
        var el = document.getElementById("statusMsg");
        el.textContent = msg;
        el.className = type;
        el.style.display = "block";
      }

      function getFormValues() {
        return {
          secret:    document.getElementById("adminSecret").value,
          vehicleId: document.getElementById("vehicleSelect").value,
          from:      document.getElementById("fromDate").value,
          to:        document.getElementById("toDate").value,
        };
      }

      function validate(vals) {
        if (!vals.secret) { showStatus("Please enter the admin password.", "error"); return false; }
        if (!vals.from)   { showStatus("Please select a pickup date.", "error"); return false; }
        if (!vals.to)     { showStatus("Please select a return date.", "error"); return false; }
        if (vals.from > vals.to) { showStatus("Pickup date must be on or before the return date.", "error"); return false; }
        return true;
      }

      document.getElementById("blockBtn").addEventListener("click", function () {
        var vals = getFormValues();
        if (!validate(vals)) return;
        showStatus("Blocking dates…", "info");
        fetch(API_BASE + "/api/block-dates", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(vals),
        })
          .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
          .then(function (result) {
            if (!result.ok) {
              showStatus("Error: " + (result.data.error || "Unknown error"), "error");
            } else if (result.data.added === 0) {
              showStatus("These dates are already blocked (overlap with an existing booking detected).", "info");
            } else {
              showStatus("✅ Dates blocked successfully. The calendar will now show these dates as unavailable.", "success");
              loadBookings();
            }
          })
          .catch(function (err) { showStatus("Network error: " + err.message, "error"); });
      });

      document.getElementById("unblockBtn").addEventListener("click", function () {
        var vals = getFormValues();
        if (!validate(vals)) return;
        if (!confirm("Are you sure you want to unblock " + vals.from + " to " + vals.to + " for the " + vals.vehicleId + "? This will make those dates available for new bookings.")) return;
        showStatus("Unblocking dates…", "info");
        fetch(API_BASE + "/api/open-dates", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(vals),
        })
          .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
          .then(function (result) {
            if (!result.ok) {
              showStatus("Error: " + (result.data.error || "Unknown error"), "error");
            } else if (result.data.removed === 0) {
              showStatus("No matching blocked range found for those exact dates.", "info");
            } else {
              showStatus("✅ Dates unblocked. Those dates are now available for new bookings.", "success");
              loadBookings();
            }
          })
          .catch(function (err) { showStatus("Network error: " + err.message, "error"); });
      });

      function loadBookings() {
        fetch(API_BASE + "/api/booked-dates")
          .then(function (r) { return r.ok ? r.json() : Promise.reject(r.status); })
          .then(function (data) {
            var list = document.getElementById("bookingsList");
            var entries = [];
            Object.keys(data).forEach(function (vid) {
              (data[vid] || []).forEach(function (range) {
                entries.push({ vehicleId: vid, from: range.from, to: range.to });
              });
            });
            if (entries.length === 0) {
              list.innerHTML = '<span class="no-bookings">No dates are currently blocked.</span>';
              return;
            }
            entries.sort(function (a, b) { return a.from < b.from ? -1 : a.from > b.from ? 1 : 0; });
            list.innerHTML = entries.map(function (e) {
              return '<div class="booking-entry">'
                + '<span>' + e.from + ' &rarr; ' + e.to + '</span>'
                + '<span class="vehicle-badge">' + e.vehicleId + '</span>'
                + '</div>';
            }).join("");
          })
          .catch(function () {
            document.getElementById("bookingsList").innerHTML = '<span class="no-bookings">Could not load bookings.</span>';
          });
      }

      loadBookings();
    })();
  </script>
</body>
</html>
